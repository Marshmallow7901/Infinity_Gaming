[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/Web%20page%20example/Pages/Home%20Page.html"
  status = 302

[[redirects]]
  from = "/Pages/*"
  to = "/Web%20page%20example/Pages/:splat"
  status = 200

[[redirects]]
  from = "/Styles/*"
  to = "/Web%20page%20example/Styles/:splat"
  status = 200

[[redirects]]
  from = "/Scripts/*"
  to = "/Web%20page%20example/Scripts/:splat"
  status = 200

[[redirects]]
  from = "/pics/*"
  to = "/Web%20page%20example/pics/:splat"
  status = 200

[[redirects]]
  from = "/404.html"
  to = "/Web%20page%20example/404.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/Web%20page%20example/404.html"
  status = 404
