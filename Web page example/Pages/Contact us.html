    <div class="contact-wrapper">
        <form action="submit_form.php" method="POST">
            <h2>Contact Us</h2>

            <label for="name">First Name</label>
            <input type="text" id="name" name="name" placeholder="Your first name" required />

            <label for="surname">Surname</label>
            <input type="text" id="surname" name="surname" placeholder="Your surname" required />

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />

            <label for="cellphone">Cellphone Number</label>
            <input type="tel" id="cellphone" name="cellphone" placeholder="+27 00 000 0000" required />

            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>

            <button type="submit" class="button">Send Message</button>
        </form>
    </div>
